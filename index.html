<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Selamat Ulang Tahun Ade Nur Syamsiah ✨</title>

<link rel="icon" href="assets/favicon.png">

<link rel="stylesheet" href="css/style.css">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- MUSIC -->

<audio id="bgMusic" loop>
    <source src="assets/music.mp3" type="audio/mpeg">
</audio>

<!-- COUNTDOWN -->

<div id="countdown-screen">

<div class="count-wrapper">

    <h2>Birthday Gift for My Sister</h2>

    <h1>Nur Syamsiah ✨</h1>

    <div id="count">3</div>

</div>

</div>

<!-- PARTICLES -->

<div id="particles"></div>

<!-- MAIN -->

<div class="container">

<!-- PHOTO -->
<div class="photo-section">

    <div class="photo-frame">

        <img
        id="slideImage"
        src="assets/foto1.jpg"
        alt="Nur Syamsiah">

    </div>

</div>

<!-- ENVELOPE -->
<div class="envelope-container">

    <div class="envelope" id="envelope">

        <div class="envelope-top"></div>

        <div class="seal">
            ✨
        </div>

    </div>

</div>

<!-- LETTER -->
<div class="letter" id="letter">

    <h1 class="title">
        🎂 Selamat Ulang Tahun 🎂
    </h1>

    <h2 class="name">
        Nur Syamsiah
    </h2>

    <div
    id="typed-message"
    class="typed-message">
    </div>

    <button
    id="specialBtn"
    class="gold-btn">

        Buka Ucapan Spesial ✨

    </button>

</div>

</div>

<!-- POPUP -->

<div class="popup" id="popup">

<div class="popup-content">

    <span class="close-popup">
        &times;
    </span>

    <h2>
        💖 Ucapan Spesial 💖
    </h2>

    <p>
        Selamat Ulang Tahun Ade Nur Syamsiah.

        Semoga semakin rajin belajar,
        rajin menulis, menjadi siswa
        berprestasi, membanggakan
        orang tua, dan semua cita-cita
        dapat tercapai.
    </p>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
